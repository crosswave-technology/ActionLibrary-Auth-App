name: "GitHub App Authentication"
description: |
  Generates a short-lived installation token for a GitHub App using a manually
  crafted JWT (OpenSSL). Outputs the token and sets GH_TOKEN + GITHUB_TOKEN for
  subsequent steps in the calling workflow. Token is automatically masked in logs.

inputs:
  app-id:
    description: "GitHub App ID (GNM_APP_ID)"
    required: true
  app-installation-id:
    description: "GitHub App Installation ID (GNM_APP_INSTALLATION_ID)"
    required: true
  app-private-key:
    description: "GitHub App RSA private key (GNM_APP_PRIVATE_KEY)"
    required: true

outputs:
  token:
    description: "Short-lived installation token (valid ~10 minutes)"
    value: ${{ steps.generate.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Generate Installation Token
      id: generate
      shell: bash
      env:
        INPUT_APP_ID: ${{ inputs.app-id }}
        INPUT_INSTALLATION_ID: ${{ inputs.app-installation-id }}
        INPUT_PRIVATE_KEY: ${{ inputs.app-private-key }}
      run: |
        set -euo pipefail
        if [ -z "${INPUT_APP_ID:-}" ] || [ -z "${INPUT_INSTALLATION_ID:-}" ] || [ -z "${INPUT_PRIVATE_KEY:-}" ]; then
          echo "::error::Missing required GitHub App credentials. Ensure GNM_APP_ID, GNM_APP_INSTALLATION_ID, and GNM_APP_PRIVATE_KEY are set." >&2
          exit 1
        fi
        pem_file=$(mktemp)
        trap 'rm -f "$pem_file"' EXIT
        printf '%s' "$INPUT_PRIVATE_KEY" > "$pem_file"
        iat=$(date +%s)
        exp=$((iat + 540))
        header=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$INPUT_APP_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        unsigned="${header}.${payload}"
        signature=$(printf '%s' "$unsigned" | openssl dgst -sha256 -sign "$pem_file" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
        jwt="${unsigned}.${signature}"
        response=$(curl -sS -X POST -H "Authorization: Bearer ${jwt}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/app/installations/${INPUT_INSTALLATION_ID}/access_tokens")
        token=$(echo "$response" | jq -r '.token // empty')
        if [ -z "$token" ]; then
          echo "::error::Failed to generate installation token: $(echo "$response" | jq -r '.message // "unknown error"')" >&2
          exit 1
        fi
        echo "::add-mask::${token}"
        echo "token=${token}" >> "$GITHUB_OUTPUT"
        echo "GH_TOKEN=${token}" >> "$GITHUB_ENV"
        echo "GITHUB_TOKEN=${token}" >> "$GITHUB_ENV"